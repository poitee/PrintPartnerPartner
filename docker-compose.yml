services:
  print-partner:
    image: ghcr.io/poitee/print-partner:latest
    # Fallback for building from source: docker compose up --build
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      PRINT_PARTNER_DATA_DIR: "/data"
      STATIC_DIR: "/app/web/apps/web/dist"
      DEPLOY_MODE: "self-host"
      # Optional: require API key for /api/v1 automation (slicers, scripts)
      # PRINT_PARTNER_API_KEY: "change-me-to-a-long-random-secret"
    volumes:
      - print-partner-data:/data
    healthcheck:
      # node:22-bookworm-slim has no curl/wget; use node's built-in fetch.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  print-partner-data:
