name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install ruff
      - name: Ruff
        run: |
          ruff check \
            src/print_partner/ui/recompute_worker.py \
            src/print_partner/ui/catalog_sync_worker.py \
            src/print_partner/ui/export_worker.py \
            src/print_partner/ui/project_library.py \
            src/print_partner/ui/profile_composer.py \
            src/print_partner/ui/parts_tree_widget.py
      - name: Pytest
        run: pytest -q
