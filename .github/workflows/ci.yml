name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            pytest-args: "-q"
          - os: ubuntu-latest
            python-version: "3.12"
            pytest-args: "-q"
          - os: macos-latest
            python-version: "3.11"
            pytest-args: "-q"
          - os: windows-latest
            python-version: "3.11"
            pytest-args: "-q -k 'not repo_import_dialog'"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-xfixes0 \
            libxcb-cursor0 \
            libfontconfig1
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest ${{ matrix.pytest-args }}
