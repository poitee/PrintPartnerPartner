name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            pytest-args: "-q"
          - os: ubuntu-latest
            python-version: "3.12"
            pytest-args: "-q"
          - os: macos-latest
            python-version: "3.11"
            pytest-args: "-q"
          - os: windows-latest
            python-version: "3.11"
            pytest-args: "-q -k 'not repo_import_dialog'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest ${{ matrix.pytest-args }}
