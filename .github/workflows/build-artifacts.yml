# Build PyInstaller bundles on Linux, macOS, and Windows (no GitHub Release publish).
# Use before tagging: Actions → Build all platforms → Run workflow.
name: Build all platforms

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-reusable.yml
    with:
      run_tests: true
      upload_artifacts: true
