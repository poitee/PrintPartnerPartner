name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
          - os: macos-13
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install "numpy>=1.26.4,<2"
          python -c "import numpy; print('numpy', numpy.__version__)"

      - name: Pytest
        run: pytest -q

      - name: PyInstaller
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: pyinstaller packaging/print_partner.spec --noconfirm

      - name: Verify macOS NumPy in bundle
        if: runner.os == 'macOS'
        run: python packaging/verify_macos_numpy.py

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        run: chmod +x packaging/package_artifacts.sh && ./packaging/package_artifacts.sh

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "dist/Print Partner"
          if (-not (Test-Path $dist)) { throw "Missing $dist" }
          $ver = python -c "from print_partner import __version__; print(__version__)"
          $zip = "dist/artifacts/print-partner-$ver-windows.zip"
          New-Item -ItemType Directory -Force -Path dist/artifacts | Out-Null
          Compress-Archive -Path $dist -DestinationPath $zip -Force

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/artifacts/
            dist/Print-Partner-*.dmg
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
