# Tag push (v*) or manual re-run: verify version, build all platforms, publish GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to verify (e.g. 0.2.3); defaults to tag name"
        required: false
        type: string
      prerelease:
        description: Mark as pre-release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "Could not determine release version" >&2
            exit 1
          fi

      - name: Verify package version and CHANGELOG
        run: python packaging/verify_release_version.py "${{ steps.ver.outputs.version }}"

  build:
    name: Build (${{ matrix.os }})
    needs: verify
    uses: ./.github/workflows/build-reusable.yml
    with:
      run_tests: true
      upload_artifacts: true

  release:
    name: Publish GitHub Release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Require Linux, macOS, and Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          linux=$(find release-files -name '*-linux-*.tar.gz' | head -1)
          macos=$(find release-files -name '*-macos-*.zip' | head -1)
          windows=$(find release-files -name '*-windows*.zip' | head -1)
          echo "linux=$linux"
          echo "macos=$macos"
          echo "windows=$windows"
          test -n "$linux" || { echo "Missing Linux .tar.gz"; exit 1; }
          test -n "$macos" || { echo "Missing macOS .zip"; exit 1; }
          test -n "$windows" || { echo "Missing Windows .zip"; exit 1; }

      - name: Artifact manifest
        shell: bash
        run: |
          echo "## Release artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size | SHA256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r f; do
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            hash=$(sha256sum "$f" | awk '{print $1}')
            echo "| \`$(basename "$f")\` | ${size} bytes | \`${hash:0:16}…\` |" >> "$GITHUB_STEP_SUMMARY"
          done < <(find release-files -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' \) | sort)

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          ver="${{ needs.verify.outputs.version }}"
          if python packaging/changelog_release_body.py "$ver" -o /tmp/release_body.md; then
            echo "use_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (CHANGELOG body)
        if: steps.notes.outputs.use_changelog == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.verify.outputs.version }}
          name: v${{ needs.verify.outputs.version }}
          body_path: /tmp/release_body.md
          prerelease: ${{ github.event.inputs.prerelease == true }}
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (generated notes)
        if: steps.notes.outputs.use_changelog != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.verify.outputs.version }}
          name: v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == true }}
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
